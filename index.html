<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Buzzy — Bus Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="description" content="Real-time bus tracking application">
  <link rel="manifest" href="manifest.json" />
  
  <!-- Fonts & Leaflet -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    /* --- CSS Variables & Reset --- */
    :root {
      --primary: #2563eb;       /* Blue 600 */
      --primary-dark: #1d4ed8;  /* Blue 700 */
      --primary-light: #eff6ff; /* Blue 50 */
      --bg: #f8fafc;           /* Slate 50 */
      --surface: #ffffff;
      --text-main: #0f172a;    /* Slate 900 */
      --text-muted: #64748b;   /* Slate 500 */
      --border: #e2e8f0;       /* Slate 200 */
      --danger: #ef4444;       /* Red 500 */
      --success: #22c55e;      /* Green 500 */
      --warning: #f59e0b;      /* Amber 500 */
      
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      
      --glass: rgba(255, 255, 255, 0.92);
      --glass-border: rgba(255, 255, 255, 0.5);
      --blur: blur(12px);
      
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 8px;
      
      --header-height: 60px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
    }

    /* --- Icons --- */
    .icon { width: 20px; height: 20px; stroke-width: 2; stroke: currentColor; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .icon-sm { width: 16px; height: 16px; }

    /* --- Layout --- */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh; /* Dynamic viewport height */
    }

    /* Header */
    header {
      height: var(--header-height);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 50;
      flex-shrink: 0;
      box-shadow: var(--shadow-sm);
    }
    
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text-main);
    }
    
    .logo-box {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: var(--radius-sm);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
      box-shadow: 0 2px 4px rgba(37, 99, 235, 0.3);
    }

    .header-actions { display: flex; gap: 8px; }

    /* Main Content Area */
    .main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* Map Section */
    .map-section {
      position: relative;
      flex: 1;
      background: #e2e8f0; /* placeholder bg */
      display: flex;
      flex-direction: column;
    }
    
    #map { width: 100%; height: 100%; z-index: 1; }

    /* Floating Map Controls */
    .map-overlay-top {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 20;
      pointer-events: none; /* Let clicks pass through around items */
      display: flex;
      justify-content: center;
    }
    
    .search-bar {
      pointer-events: auto;
      background: var(--glass);
      backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      padding: 8px 12px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 400px;
      transition: transform 0.2s;
    }
    .search-bar:focus-within { transform: scale(1.02); }
    .search-bar input {
      border: none;
      background: transparent;
      outline: none;
      font-size: 14px;
      width: 100%;
      color: var(--text-main);
    }

    .map-overlay-bottom {
      position: absolute;
      bottom: 24px;
      right: 16px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Buttons */
    .btn-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-main);
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: var(--shadow-md);
      transition: all 0.2s;
    }
    .btn-icon:active { transform: scale(0.95); }
    .btn-icon.primary { background: var(--primary); color: white; border: none; }
    .btn-icon.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }

    .btn-pill {
      height: 36px;
      padding: 0 16px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-main);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .btn-pill:active { transform: scale(0.96); background: var(--bg); }
    .btn-pill.primary { background: var(--primary); color: white; border: none; box-shadow: 0 2px 4px rgba(37,99,235,0.3); }
    .btn-pill.full-width { width: 100%; justify-content: center; height: 44px; font-size: 15px; }

    /* Sidebar / Bottom Sheet */
    .sidebar {
      width: 360px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      z-index: 30;
      box-shadow: -2px 0 10px rgba(0,0,0,0.05);
    }

    .sidebar-content { padding: 20px; display: flex; flex-direction: column; gap: 16px; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      box-shadow: var(--shadow-sm);
    }
    .card-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Gauge */
    .gauge-container {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 0 auto;
    }
    .gauge-value {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .gauge-number { font-size: 2rem; font-weight: 800; line-height: 1; }
    .gauge-unit { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; margin-top: 4px; }
    .gauge-bg { fill: none; stroke: var(--bg); stroke-width: 8; stroke-linecap: round; }
    .gauge-fill { fill: none; stroke: var(--primary); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }

    /* Logs */
    .log-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 200px;
      overflow-y: auto;
    }
    .log-item {
      font-size: 0.8rem;
      padding: 8px 10px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 3px solid var(--text-muted);
    }
    .log-item.alert { border-left-color: var(--danger); background: #fef2f2; }
    .log-item.success { border-left-color: var(--success); background: #f0fdf4; }

    /* Alert Toast (for minor logs) */
    .toast-container {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      width: 90%;
      max-width: 400px;
      pointer-events: none;
    }
    .toast {
      background: var(--surface);
      padding: 12px 16px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      border-left: 4px solid var(--primary);
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      pointer-events: auto;
      animation: slideDown 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      transition: opacity 0.3s;
    }
    @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* Critical Alert Modal Overlay */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(4px);
      z-index: 9999;
      display: none; /* Hidden by default */
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .modal-overlay.active { display: flex; opacity: 1; }
    
    .modal-content {
      background: var(--surface);
      padding: 24px;
      border-radius: var(--radius-lg);
      width: 90%;
      max-width: 340px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-overlay.active .modal-content { transform: scale(1); }
    
    .modal-icon-wrapper {
      width: 60px; height: 60px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px auto;
    }
    .modal-icon-wrapper.success { background: #dcfce7; color: var(--success); }
    .modal-icon-wrapper.warning { background: #fef3c7; color: var(--warning); }
    
    .modal-title { font-size: 1.25rem; font-weight: 800; margin: 0 0 8px 0; color: var(--text-main); }
    .modal-msg { font-size: 0.95rem; color: var(--text-muted); margin: 0 0 24px 0; line-height: 1.5; }

    /* Footer */
    .app-footer {
      font-size: 0.7rem;
      text-align: center;
      color: var(--text-muted);
      margin-top: auto;
      padding-top: 20px;
    }

    /* Screen flash animation for arrived state */
    @keyframes flash-success {
      0% { box-shadow: inset 0 0 0 0 var(--success); }
      50% { box-shadow: inset 0 0 20px 5px rgba(34, 197, 94, 0.4); }
      100% { box-shadow: inset 0 0 0 0 var(--success); }
    }
    body.arrived-flash {
      animation: flash-success 1.5s ease-in-out 3;
    }

    /* --- Responsive Logic --- */
    @media (max-width: 768px) {
      .main-layout { flex-direction: column; }
      .brand span { display: none; } 
      .map-section { flex: 6; min-height: 40%; }
      .sidebar {
        width: 100%;
        flex: 4;
        border-left: none;
        border-top: 1px solid var(--border);
        box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
      }
      .sidebar-content { padding: 16px; gap: 12px; }
      .gauge-container { width: 100px; height: 100px; }
      .gauge-number { font-size: 1.5rem; }
      .map-overlay-bottom { bottom: 16px; right: 16px; }
    }
  </style>
</head>
<body>

  <div id="app">
    <header>
      <div class="brand">
        <div class="logo-box">B</div>
        <span>Buzzy</span>
      </div>
      <div class="header-actions">
        <button id="notifBtn" class="btn-pill" title="Notifications">
          <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
          <span class="label">Enable</span>
        </button>
      </div>
    </header>

    <div class="main-layout">
      <!-- Map Area -->
      <section class="map-section">
        <!-- Search Floating Bar -->
        <div class="map-overlay-top">
          <div class="search-bar">
            <svg class="icon" style="color:var(--text-muted)" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input id="searchInput" type="text" placeholder="Search Bus ID (e.g. driver-1)" enterkeyhint="search" />
            <button id="searchBtn" class="btn-pill primary" style="height:28px; padding:0 12px; font-size:12px;">Go</button>
          </div>
        </div>

        <!-- FABs -->
        <div class="map-overlay-bottom">
          <!-- Toggle Fleet Visibility Button -->
          <button id="toggleFleetBtn" class="btn-icon" title="Toggle Other Buses (Clear Map)">
            <svg class="icon" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
          <button id="layerBtn" class="btn-icon" title="Switch Layers">
            <svg class="icon" viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
          </button>
          <button id="centerBtn" class="btn-icon" title="Center on Bus">
            <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="22" y1="12" x2="18" y2="12"></line><line x1="6" y1="12" x2="2" y2="12"></line><line x1="12" y1="6" x2="12" y2="2"></line><line x1="12" y1="22" x2="12" y2="18"></line></svg>
          </button>
          <button id="goHomeBtn" class="btn-icon primary" title="Go to Home">
            <svg class="icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          </button>
        </div>

        <div id="map"></div>
      </section>

      <!-- Sidebar Info Panel -->
      <aside class="sidebar">
        <div class="sidebar-content">
          
          <!-- Selected Bus Info -->
          <div class="card">
            <div class="card-title">
              <span>Current Status</span>
              <span id="selectedId" style="color:var(--primary); font-weight:800;">No Bus Selected</span>
            </div>
            
            <div class="gauge-container">
              <svg viewBox="0 0 100 100" style="transform: rotate(-90deg); width:100%; height:100%;">
                <circle cx="50" cy="50" r="45" class="gauge-bg"></circle>
                <circle id="gaugeFill" cx="50" cy="50" r="45" class="gauge-fill" stroke-dasharray="283" stroke-dashoffset="283"></circle>
              </svg>
              <div class="gauge-value">
                <span id="speedVal" class="gauge-number">0</span>
                <span class="gauge-unit">km/h</span>
              </div>
            </div>
            
            <div style="margin-top:12px; text-align:center; font-size:0.9rem; color:var(--text-muted);">
              <div id="distanceToHome">Distance to Home: —</div>
            </div>
          </div>

          <!-- Home Settings -->
          <div class="card">
            <div class="card-title">My Home</div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
               <div id="homeInfo" style="font-size:0.85rem; font-family:monospace; color:var(--text-muted);">Not Set</div>
               <button id="setHomeBtn" class="btn-pill">Set Here</button>
            </div>
            <div style="font-size:0.75rem; color:var(--text-muted); line-height:1.4;">
              Move map to your location and click "Set Here".
            </div>
          </div>

          <!-- Logs -->
          <div class="card" style="flex:1; min-height:120px; display:flex; flex-direction:column;">
            <div class="card-title">Activity Log</div>
            <div id="logs" class="log-list"></div>
          </div>
          
          <div class="app-footer">
            Server: <code id="serverAddress">...</code>
          </div>
        </div>
      </aside>
    </div>

    <!-- Alert Toast (Minor logs) -->
    <div id="alertContainer" class="toast-container"></div>
    
    <!-- Critical Alert Modal Overlay -->
    <div id="alertModal" class="modal-overlay">
      <div class="modal-content">
        <div id="modalIconWrapper" class="modal-icon-wrapper success">
          <svg id="modalIcon" class="icon" style="width: 32px; height: 32px;" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        </div>
        <h2 id="modalTitle" class="modal-title">Alert</h2>
        <p id="modalMessage" class="modal-msg">Message goes here.</p>
        <button id="modalCloseBtn" class="btn-pill primary full-width">Dismiss Alarm</button>
      </div>
    </div>
  </div>

  <!-- External Libs -->
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    /* =========================
       CONFIG & STATE
       ========================= */
    const DEFAULT_SERVER = 'https://buzzy-server-final.onrender.com';
    const NEAR_RADIUS_M = 2000; // 2km Alert
    const VERY_CLOSE_M = 150;   // 150m Buzzer Alert

    // State
    let socket = null;
    let map;
    let tileLayers = {}, activeTile = 'osm';
    let markers = new Map(); 
    let lastKnown = new Map();
    let selectedId = null;
    let homeLocation = null;
    let homeMarker = null;
    let homeRadiusCircle = null;
    
    // Proximity tracker maps bus ID to states: 'far', 'near', 'arrived'
    const busProximityState = new Map(); 
    
    // Audio Context State
    let audioCtx = null;
    let buzzerInterval = null;
    
    let showAllBuses = true; // Toggle flag to keep map clean

    // DOM Elements
    const logsEl = document.getElementById('logs');
    const gaugeFill = document.getElementById('gaugeFill');
    const serverLabel = document.getElementById('serverAddress');

    // Display Server
    serverLabel.textContent = new URL(DEFAULT_SERVER).hostname;

    /* =========================
       INIT & AUDIO UNLOCK
       ========================= */
    window.addEventListener('load', () => {
      initMap();
      loadHome();
      connect();
      updateNotifBtn();
      
      // Register Service Worker
      if('serviceWorker' in navigator){
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('SW Registered'))
          .catch(console.error);
      }
    });

    // We initialize the AudioContext upon the first user interaction
    // to comply with browser autoplay policies natively.
    function initAudio() {
        if (!audioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        // Remove listeners once unlocked
        document.removeEventListener('click', initAudio);
        document.removeEventListener('touchstart', initAudio);
    }
    document.addEventListener('click', initAudio);
    document.addEventListener('touchstart', initAudio);

    /* =========================
       MAP & TOGGLE FLEET
       ========================= */
    function initMap(){
      map = L.map('map', { zoomControl: false, attributionControl: false }).setView([12.9716, 77.5946], 13);
      L.control.attribution({position: 'bottomleft'}).addTo(map);

      tileLayers['osm'] = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19, attribution:'&copy; OSM' });
      tileLayers['sat'] = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom:19, attribution:'&copy; Esri' });
      
      tileLayers['osm'].addTo(map);

      // Layer Toggle
      document.getElementById('layerBtn').addEventListener('click', () => {
        if(activeTile === 'osm'){
          map.removeLayer(tileLayers['osm']);
          tileLayers['sat'].addTo(map);
          activeTile = 'sat';
        } else {
          map.removeLayer(tileLayers['sat']);
          tileLayers['osm'].addTo(map);
          activeTile = 'osm';
        }
      });

      // Toggle Fleet (Clear Map of Unselected Buses)
      document.getElementById('toggleFleetBtn').addEventListener('click', (e) => {
          showAllBuses = !showAllBuses;
          const btn = e.currentTarget;
          if (!showAllBuses) {
              // Hide mode
              btn.classList.add('active');
              btn.innerHTML = `<svg class="icon" viewBox="0 0 24 24"><path d="M1 1l22 22"></path><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path></svg>`; // Eye-off
              
              markers.forEach((m, id) => {
                  if (id !== selectedId && map.hasLayer(m)) map.removeLayer(m);
              });
              showToast('Other buses cleared from map', 'info');
          } else {
              // Show mode
              btn.classList.remove('active');
              btn.innerHTML = `<svg class="icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`; // Eye open
              
              markers.forEach((m, id) => {
                  if (!map.hasLayer(m)) m.addTo(map);
              });
              showToast('Showing all tracked buses', 'info');
          }
      });
    }

    /* =========================
       SOCKET & TRACKING
       ========================= */
    function connect(){
      socket = io(`${DEFAULT_SERVER}/passengers`, { transports:['websocket'] });
      
      socket.on('connect', () => addLog('Connected to Server', 'success'));
      socket.on('disconnect', () => addLog('Disconnected', 'alert'));
      
      socket.on('location:update', handleLocationUpdate);
      socket.on('fleet:init', (arr) => arr.forEach(handleLocationUpdate));
      
      socket.emit('subscribe:fleet');
    }

    function handleLocationUpdate(loc){
      const id = loc.driverId || loc.driverID || loc.id || 'Unknown';
      const lat = Number(loc.lat);
      const lng = Number(loc.lng);
      const ts = loc.timestamp || Date.now();
      const speed = loc.speed !== undefined ? Number(loc.speed) : 0;

      lastKnown.set(id, { id, lat, lng, speed, ts });

      if(markers.has(id)){
        const m = markers.get(id);
        m.setLatLng([lat, lng]);
        m.setPopupContent(`<b>${id}</b><br>Speed: ${Math.round(speed)} km/h`);
        
        // Handle Map Visibility Based on Toggle
        if (!showAllBuses && id !== selectedId) {
            if (map.hasLayer(m)) map.removeLayer(m);
        } else {
            if (!map.hasLayer(m)) m.addTo(map);
        }
      } else {
        const busIcon = L.divIcon({
          className: 'custom-bus-icon',
          html: `<div style="background:var(--primary); width:32px; height:32px; border:2px solid white; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 6px rgba(0,0,0,0.3);">
                   <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                     <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                     <line x1="2" y1="11" x2="22" y2="11"></line>
                     <circle cx="7" cy="17" r="2"></circle>
                     <circle cx="17" cy="17" r="2"></circle>
                   </svg>
                 </div>`,
          iconSize: [32, 32],
          iconAnchor: [16, 16]
        });
        
        const m = L.marker([lat, lng], { icon: busIcon }).bindPopup(`<b>${id}</b>`);
        m.on('click', () => selectBus(id));
        markers.set(id, m);
        
        // Only add visually if not hidden
        if (showAllBuses || id === selectedId) {
            m.addTo(map);
        }
        addLog(`Tracking started for ${id}`, 'info');
      }

      if(selectedId === id) updateDashboard(id);

      // We still check proximity in the background even if map icon is hidden
      checkProximity(id, lat, lng);
    }

    /* =========================
       PROXIMITY ALERTS (MODAL FIX)
       ========================= */
    function showModalAlert(title, message, type) {
      const modal = document.getElementById('alertModal');
      const iconWrapper = document.getElementById('modalIconWrapper');
      const iconSvg = document.getElementById('modalIcon');
      
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalMessage').textContent = message;
      
      if (type === 'success') {
          iconWrapper.className = 'modal-icon-wrapper success';
          iconSvg.innerHTML = '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>';
      } else {
          iconWrapper.className = 'modal-icon-wrapper warning';
          iconSvg.innerHTML = '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line>';
      }
      
      modal.classList.add('active');
      playBuzzer(); // Force play synthetic buzzer loop when modal appears
    }

    document.getElementById('modalCloseBtn').addEventListener('click', () => {
      document.getElementById('alertModal').classList.remove('active');
      stopBuzzer(); // Stop synthetic audio loop when dismissed
    });

    function checkProximity(id, lat, lng){
      if(!homeLocation) return;
      
      const dist = haversine(homeLocation.lat, homeLocation.lng, lat, lng);
      const currentState = busProximityState.get(id) || 'far';
      
      // 1. Arrival Buzzer Logic (< 150m or literally 1 metre away)
      if (dist <= VERY_CLOSE_M) {
        if (currentState !== 'arrived') {
          busProximityState.set(id, 'arrived');
          
          const msg = `${id} has arrived! (${Math.round(dist)}m away)`;
          
          showModalAlert('Bus Arrived!', msg, 'success');
          addLog(msg, 'success');
          sendNotification(msg);
          
          document.body.classList.add('arrived-flash');
          setTimeout(() => document.body.classList.remove('arrived-flash'), 4500);

          if(navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 1000]);
        }
      } 
      // 2. Near Alert Logic (< 2000m)
      else if (dist <= NEAR_RADIUS_M) {
        if (currentState === 'far') {
          busProximityState.set(id, 'near');
          const msg = `${id} entered the 2km radius! (${Math.round(dist)}m away)`;
          
          showModalAlert('Bus Approaching', msg, 'warning');
          addLog(msg, 'alert');
          sendNotification(msg);
          
          if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
        }
      } 
      // 3. Reset state if it leaves proximity
      else {
        if (currentState !== 'far') {
          busProximityState.set(id, 'far');
          addLog(`${id} has left the proximity area.`, 'info');
        }
      }
    }

    /* =========================
       UI LOGIC
       ========================= */
    function selectBus(id){
      selectedId = id;
      document.getElementById('selectedId').textContent = id;
      updateDashboard(id);
      
      if(markers.has(id)){
        const m = markers.get(id);
        if(!map.hasLayer(m)) m.addTo(map); // Force show if hidden
        map.flyTo(m.getLatLng(), 15);
        m.openPopup();
      }
    }

    function updateDashboard(id){
      const data = lastKnown.get(id);
      if(!data) return;

      let speedKmh = data.speed;
      if(speedKmh < 40 && speedKmh > 0) speedKmh = speedKmh * 3.6; // crude check if m/s
      
      const val = Math.round(speedKmh);
      document.getElementById('speedVal').textContent = val;
      
      const maxVal = 120; 
      const dash = 283;
      const offset = dash - (Math.min(val, maxVal) / maxVal) * dash;
      gaugeFill.style.strokeDashoffset = offset;
      
      if(val > 80) gaugeFill.style.stroke = 'var(--danger)';
      else if(val > 50) gaugeFill.style.stroke = 'var(--warning)';
      else gaugeFill.style.stroke = 'var(--primary)';

      if(homeLocation){
        const d = Math.round(haversine(homeLocation.lat, homeLocation.lng, data.lat, data.lng));
        document.getElementById('distanceToHome').innerHTML = `Distance: <b>${d} m</b>`;
      }
    }

    /* =========================
       HOME SETTINGS
       ========================= */
    function loadHome(){
      try {
        const raw = localStorage.getItem('passenger_home');
        if(raw) {
          homeLocation = JSON.parse(raw);
          drawHome();
        }
      } catch(e){}
    }

    function drawHome(){
      if(!homeLocation) return;
      
      if(homeMarker) map.removeLayer(homeMarker);
      if(homeRadiusCircle) map.removeLayer(homeRadiusCircle);
      
      homeRadiusCircle = L.circle([homeLocation.lat, homeLocation.lng], {
        radius: NEAR_RADIUS_M,
        color: 'var(--warning)',
        fillColor: 'var(--warning)',
        fillOpacity: 0.1,
        weight: 2,
        dashArray: '5, 8'
      }).addTo(map);

      const homeIcon = L.divIcon({
        className: 'custom-home-icon',
        html: `<div style="background:var(--success); width:32px; height:32px; border:2px solid white; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 6px rgba(0,0,0,0.3);">
                 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                   <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                   <polyline points="9 22 9 12 15 12 15 22"></polyline>
                 </svg>
               </div>`,
        iconSize: [32, 32],
        iconAnchor: [16, 16]
      });

      homeMarker = L.marker([homeLocation.lat, homeLocation.lng], { icon: homeIcon }).addTo(map).bindPopup("<b>My Home</b><br>2km alerting radius active.");
      
      document.getElementById('homeInfo').textContent = `${homeLocation.lat.toFixed(4)}, ${homeLocation.lng.toFixed(4)}`;
    }

    document.getElementById('setHomeBtn').addEventListener('click', () => {
      const c = map.getCenter();
      homeLocation = { lat: c.lat, lng: c.lng };
      localStorage.setItem('passenger_home', JSON.stringify(homeLocation));
      drawHome();
      showToast('Home location set to map center', 'success');
      addLog('Home location updated', 'success');
      
      lastKnown.forEach(data => checkProximity(data.id, data.lat, data.lng));
    });

    document.getElementById('goHomeBtn').addEventListener('click', () => {
      if(homeLocation) map.flyTo([homeLocation.lat, homeLocation.lng], 16);
      else showToast('Home location not set yet', 'warning');
    });
    
    document.getElementById('centerBtn').addEventListener('click', () => {
        if(selectedId && markers.has(selectedId)) {
            map.flyTo(markers.get(selectedId).getLatLng(), 16);
        } else {
            showToast('No bus selected', 'warning');
        }
    });

    /* =========================
       SEARCH
       ========================= */
    const searchInput = document.getElementById('searchInput');
    const doSearch = () => {
      const q = searchInput.value.trim();
      if(!q) return;
      
      if(markers.has(q)){
        selectBus(q);
      } else {
        socket.emit('subscribe:driver', q);
        selectedId = q;
        document.getElementById('selectedId').textContent = q + ' (Searching...)';
        showToast(`Searching for ${q}...`, 'info');
      }
    };
    document.getElementById('searchBtn').addEventListener('click', doSearch);
    searchInput.addEventListener('keypress', (e) => { if(e.key==='Enter') doSearch(); });

    /* =========================
       HELPERS & ALERTS
       ========================= */
    function addLog(msg, type='info'){
      const div = document.createElement('div');
      div.className = `log-item ${type}`;
      const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      div.innerHTML = `<span>${msg}</span> <span style="font-size:0.7em; color:var(--text-muted)">${time}</span>`;
      logsEl.prepend(div);
      if(logsEl.children.length > 50) logsEl.lastChild.remove();
    }

    function showToast(msg, type='info'){
      const t = document.createElement('div');
      t.className = 'toast';
      t.style.borderLeftColor = `var(--${type})`;
      t.innerHTML = `<span>${msg}</span>`;
      document.getElementById('alertContainer').appendChild(t);
      setTimeout(() => {
          t.style.opacity = '0';
          setTimeout(() => t.remove(), 300);
      }, 4000);
    }

    function haversine(lat1, lon1, lat2, lon2){
      const R = 6371000; 
      const dLat = (lat2-lat1) * Math.PI/180;
      const dLon = (lon2-lon1) * Math.PI/180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
      return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    /* --- SYNTHETIC WEB AUDIO BUZZER --- */
    function playAlarmTone() {
        if (!audioCtx) return;
        
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        // Square wave generates a harsh, synthetic buzzer sound
        osc.type = 'square'; 
        
        // Two-tone alternating pitch for an "alarm" feel
        osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
        osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.2); 
        
        // Envelope to prevent clipping/clicking at the ends
        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.01); // Quick fade in
        gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime + 0.4);           // Hold volume
        gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.45);    // Quick fade out
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5); // Tone plays for 0.5s total
    }

    function playBuzzer(){
        initAudio(); // Ensure context is ready
        if (buzzerInterval) return; // Prevent overlapping loops
        
        playAlarmTone(); // Play first beep immediately
        buzzerInterval = setInterval(playAlarmTone, 800); // Repeat every 800ms
    }
    
    function stopBuzzer(){
        if (buzzerInterval) {
            clearInterval(buzzerInterval);
            buzzerInterval = null;
        }
    }

    /* =========================
       NOTIFICATIONS
       ========================= */
    async function updateNotifBtn(){
      if(!('Notification' in window)) {
        document.getElementById('notifBtn').style.display='none';
        return;
      }
      const p = Notification.permission;
      const label = document.querySelector('#notifBtn .label');
      if(p === 'granted') label.textContent = 'On';
      else if(p === 'denied') label.textContent = 'Denied';
      else label.textContent = 'Enable';
    }

    document.getElementById('notifBtn').addEventListener('click', async () => {
      if(!('Notification' in window)) return;
      const p = await Notification.requestPermission();
      updateNotifBtn();
      if(p === 'granted') showToast('System Notifications Enabled', 'success');
    });

    function sendNotification(body){
      if(Notification.permission === 'granted') {
          new Notification('Buzzy Alert', { body, icon: 'icon-192.png' });
      }
    }
  </script>
